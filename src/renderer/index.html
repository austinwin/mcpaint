<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; script-src 'self' 'unsafe-eval'">
  <title>McPaint</title>
</head>
<body>
  <div id="app">
    <!-- Chrome area: menu + toolbars + tab strip -->
    <div id="chrome-area">
      <!-- Menu Row -->
      <div id="menu-row">
        <span class="menu-item">File</span>
        <span class="menu-item">Edit</span>
        <span class="menu-item">View</span>
        <span class="menu-item">Image</span>
        <span class="menu-item">Layers</span>
        <span class="menu-item">Adjustments</span>
        <span class="menu-item">Effects</span>
        <span class="menu-item">Utilities</span>
        <span class="menu-item">Window</span>
        <span class="menu-item">Help</span>
      </div>

      <!-- Command Toolbar -->
      <div id="cmd-toolbar">
        <div class="tb-group">
          <button id="btn-new" class="tb-btn" title="New (⌘N)">
            <svg width="16" height="16" viewBox="0 0 16 16"><rect x="1.5" y="3" width="10" height="11" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M4.5 3V2A1 1 0 015.5 1h7L15 4v9a1 1 0 01-1 1h-1.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button id="btn-open" class="tb-btn" title="Open (⌘O)">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 3.5h3.5l1 1H14v7a1 1 0 01-1 1H2z" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          </button>
          <button id="btn-save" class="tb-btn" title="Save (⌘S)">
            <svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="1" width="12" height="14" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="5" y="1" width="6" height="3.5" fill="currentColor" opacity="0.3"/><path d="M5 1v3.5h6V1" fill="none" stroke="currentColor" stroke-width="1.3"/></svg>
          </button>
        </div>
        <span class="tb-sep"></span>
        <div class="tb-group">
          <button id="btn-cut" class="tb-btn" title="Cut (⌘X)"><svg width="16" height="16" viewBox="0 0 16 16"><circle cx="4" cy="4" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="11" cy="11" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="5.8" y1="5.8" x2="9.2" y2="9.2" stroke="currentColor" stroke-width="1.5"/></svg></button>
          <button id="btn-copy" class="tb-btn" title="Copy (⌘C)"><svg width="16" height="16" viewBox="0 0 16 16"><rect x="1.5" y="2.5" width="8" height="10" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="5.5" y="4.5" width="8" height="10" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></button>
          <button id="btn-paste" class="tb-btn" title="Paste (⌘V)"><svg width="16" height="16" viewBox="0 0 16 16"><rect x="3" y="1" width="10" height="13" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="5.5" y="4" width="5" height="5" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.3"/></svg></button>
        </div>
        <span class="tb-sep"></span>
        <div class="tb-group">
          <button id="btn-undo" class="tb-btn" title="Undo (⌘Z)"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M5 3H2v3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 3a6 6 0 101 3.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
          <button id="btn-redo" class="tb-btn" title="Redo (⌘Y)"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M11 3h3v3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 3a6 6 0 11-1 3.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        </div>
        <span class="tb-sep"></span>
        <div class="tb-group">
          <button id="btn-zoom-out" class="tb-btn" title="Zoom Out">−</button>
          <select id="zoom-select" class="tb-select">
            <option value="0.01">1%</option><option value="0.12">12.5%</option>
            <option value="0.25">25%</option><option value="0.33">33%</option>
            <option value="0.5">50%</option><option value="0.66">66%</option>
            <option value="1" selected>100%</option><option value="2">200%</option>
            <option value="4">400%</option><option value="8">800%</option>
            <option value="16">1600%</option><option value="32">3200%</option>
          </select>
          <button id="btn-zoom-in" class="tb-btn" title="Zoom In">＋</button>
        </div>
        <span class="tb-sep"></span>
        <div class="tb-group">
          <button id="btn-crop" class="tb-btn" title="Crop to Selection"><svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.5"/><line x1="2" y1="5.5" x2="4.5" y2="5.5" stroke="currentColor" stroke-width="1.3"/><line x1="2" y1="9.5" x2="4.5" y2="9.5" stroke="currentColor" stroke-width="1.3"/><line x1="11.5" y1="5.5" x2="14" y2="5.5" stroke="currentColor" stroke-width="1.3"/><line x1="11.5" y1="9.5" x2="14" y2="9.5" stroke="currentColor" stroke-width="1.3"/></svg></button>
          <button id="btn-deselect" class="tb-btn" title="Deselect (⌘D)"><svg width="16" height="16" viewBox="0 0 16 16"><rect x="1" y="7" width="14" height="2.5" rx="0.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M10 10.5v3.5l-2-1.5-2 1.5v-3.5" fill="none" stroke="currentColor" stroke-width="1.3"/></svg></button>
        </div>
        <span class="tb-spacer"></span>
        <button id="btn-theme" class="tb-btn" title="Toggle Theme">
          <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 2a6 6 0 000 12V2z" fill="currentColor" opacity="0.4"/></svg>
        </button>
      </div>

      <!-- Tool Options Bar -->
      <div id="options-bar">
        <span id="opt-tool-name" style="font-weight:600;">Brush</span>
        <span class="opt-sep"></span>
        <span class="opt-group" id="opt-group-size"><label>Size</label><input type="range" id="opt-size" min="1" max="500" value="8"><input type="number" id="opt-size-n" value="8" style="width:32px"></span>
        <span class="opt-group" id="opt-group-hardness"><label>Hard</label><input type="range" id="opt-hard" min="0" max="100" value="75"><input type="number" id="opt-hard-n" value="75" style="width:32px"></span>
        <span class="opt-group" id="opt-group-tolerance"><label>Tol</label><input type="range" id="opt-tol" min="0" max="255" value="32"><input type="number" id="opt-tol-n" value="32" style="width:32px"></span>
        <span class="opt-group" id="opt-group-fill"><label>Fill</label><select id="opt-fill"><option value="Outline">Outline</option><option value="Filled">Filled</option><option value="FilledOutline">Both</option></select></span>
        <span class="opt-group" id="opt-group-gradient"><label>Type</label><select id="opt-grad"><option value="linear">Linear</option><option value="radial">Radial</option><option value="diamond">Diamond</option><option value="reflected">Reflected</option></select></span>
        <span class="opt-group" id="opt-group-radius"><label>Rad</label><input type="range" id="opt-rad" min="1" max="100" value="10"><input type="number" id="opt-rad-n" value="10" style="width:32px"></span>
        <span class="opt-group" id="opt-group-selmode"><label>Mode</label><select id="opt-selmode"><option value="replace">Replace</option><option value="add">Add</option><option value="subtract">Subtract</option><option value="intersect">Intersect</option><option value="xor">Xor</option></select></span>
        <span class="opt-group" id="opt-group-aa"><label>AA</label><input type="checkbox" id="opt-aa" checked></span>
        <span class="opt-group" id="opt-group-font"><label>Font</label><select id="opt-font"><option value="-apple-system">System</option><option value="serif">Serif</option><option value="monospace">Mono</option><option value="cursive">Cursive</option></select></span>
        <span class="opt-group" id="opt-group-fontstyle">
          <button id="opt-bold" class="opt-style-btn" title="Bold">B</button>
          <button id="opt-italic" class="opt-style-btn" title="Italic"><i>I</i></button>
          <button id="opt-underline" class="opt-style-btn" title="Underline"><u>U</u></button>
        </span>
        <span class="opt-group" id="opt-group-align"><label>Align</label><select id="opt-align"><option value="left">Left</option><option value="center">Center</option><option value="right">Right</option></select></span>
      </div>

      <!-- Document Tab Strip -->
      <div id="tab-strip"></div>
    </div>

    <!-- Workspace (canvas area + floating panels) -->
    <div id="workspace">
      <div id="workspace-inner">
        <div id="canvas-wrap">
          <canvas id="main-canvas"></canvas>
          <canvas id="overlay-canvas"></canvas>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
      <span id="sts-msg" style="flex:1;">Ready.</span>
      <span class="sts-div"></span>
      <span id="sts-pos">0, 0 px</span>
      <span class="sts-div"></span>
      <span id="sts-sel">0 × 0 px</span>
      <span class="sts-div"></span>
      <span id="sts-size">800 × 600 px</span>
      <span class="sts-div"></span>
      <span id="sts-zoom" class="sts-clickable" title="Click to set zoom">100%</span>
      <span class="sts-div"></span>
      <span id="sts-layer">Background</span>
    </div>
  </div>
</body>
</html>
