<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; script-src 'self' 'unsafe-eval'">
  <title>McPaint</title>
</head>
<body>
  <div id="app">
    <!-- Chrome area: menu + toolbars + tab strip -->
    <div id="chrome-area">
      <!-- Menu Row -->
      <div id="menu-row">
        <span class="menu-item">File</span>
        <span class="menu-item">Edit</span>
        <span class="menu-item">View</span>
        <span class="menu-item">Image</span>
        <span class="menu-item">Layers</span>
        <span class="menu-item">Adjustments</span>
        <span class="menu-item">Effects</span>
        <span class="menu-item">Utilities</span>
        <span class="menu-item">Window</span>
        <span class="menu-item">Help</span>
      </div>

      <!-- Command Toolbar -->
      <div id="cmd-toolbar">
        <div class="tb-group">
          <button id="btn-new" class="tb-btn" title="New (⌘N)">
            <svg width="14" height="14"><rect x="1" y="2" width="12" height="10" fill="none" stroke="currentColor" stroke-width="1.3"/><path d="M4 2V1h8l2 2v8H13" fill="none" stroke="currentColor" stroke-width="1.3"/></svg>
          </button>
          <button id="btn-open" class="tb-btn" title="Open (⌘O)">
            <svg width="14" height="14"><path d="M2 3h4l1 1h5v7H2z" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
          </button>
          <button id="btn-save" class="tb-btn" title="Save (⌘S)">
            <svg width="14" height="14"><rect x="2" y="1" width="10" height="12" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="5" y="1" width="4" height="3" fill="none" stroke="currentColor" stroke-width="1"/></svg>
          </button>
          <button id="btn-print" class="tb-btn" title="Print">
            <svg width="14" height="14"><rect x="2" y="4" width="10" height="8" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="4" y="1" width="6" height="3" fill="none" stroke="currentColor" stroke-width="1"/></svg>
          </button>
        </div>
        <span class="tb-sep"></span>
        <div class="tb-group">
          <button id="btn-cut" class="tb-btn" title="Cut (⌘X)"><svg width="14" height="14"><circle cx="4" cy="4" r="2.5" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="10" r="2.5" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="6" y1="6" x2="8" y2="8" stroke="currentColor" stroke-width="1.3"/></svg></button>
          <button id="btn-copy" class="tb-btn" title="Copy (⌘C)"><svg width="14" height="14"><rect x="2" y="2" width="8" height="9" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="5" y="5" width="8" height="9" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>
          <button id="btn-paste" class="tb-btn" title="Paste (⌘V)"><svg width="14" height="14"><rect x="3" y="1" width="8" height="11" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="5" y="3" width="4" height="4" fill="none" stroke="currentColor" stroke-width="1"/></svg></button>
        </div>
        <span class="tb-sep"></span>
        <div class="tb-group">
          <button id="btn-undo" class="tb-btn" title="Undo (⌘Z)"><svg width="14" height="14"><path d="M5 3H1v4" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M1 3a5.5 5.5 0 1 1-1 2.5" fill="none" stroke="currentColor" stroke-width="1.4"/></svg></button>
          <button id="btn-redo" class="tb-btn" title="Redo (⌘Y)"><svg width="14" height="14"><path d="M9 3h4v4" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M13 3a5.5 5.5 0 1 0 1 2.5" fill="none" stroke="currentColor" stroke-width="1.4"/></svg></button>
        </div>
        <span class="tb-sep"></span>
        <div class="tb-group">
          <button id="btn-zoom-out" class="tb-btn" title="Zoom Out">−</button>
          <select id="zoom-select" class="tb-select">
            <option value="0.01">1%</option><option value="0.12">12.5%</option>
            <option value="0.25">25%</option><option value="0.33">33%</option>
            <option value="0.5">50%</option><option value="0.66">66%</option>
            <option value="1" selected>100%</option><option value="2">200%</option>
            <option value="4">400%</option><option value="8">800%</option>
            <option value="16">1600%</option><option value="32">3200%</option>
          </select>
          <button id="btn-zoom-in" class="tb-btn" title="Zoom In">＋</button>
        </div>
        <span class="tb-sep"></span>
        <div class="tb-group">
          <button id="btn-crop" class="tb-btn" title="Crop to Selection"><svg width="14" height="14"><rect x="2" y="2" width="10" height="10" fill="none" stroke="currentColor" stroke-width="1.2"/><line x1="2" y1="5" x2="5" y2="5" stroke="currentColor" stroke-width="1.2"/><line x1="2" y1="9" x2="5" y2="9" stroke="currentColor" stroke-width="1.2"/><line x1="9" y1="5" x2="12" y2="5" stroke="currentColor" stroke-width="1.2"/><line x1="9" y1="9" x2="12" y2="9" stroke="currentColor" stroke-width="1.2"/></svg></button>
          <button id="btn-deselect" class="tb-btn" title="Deselect (⌘D)"><svg width="14" height="14"><rect x="1" y="7" width="12" height="3" fill="none" stroke="currentColor" stroke-width="1.2"/></svg></button>
        </div>
        <span class="tb-spacer"></span>
        <button id="btn-theme" class="tb-btn" title="Toggle Theme">☀</button>
      </div>

      <!-- Tool Options Bar -->
      <div id="options-bar">
        <span id="opt-tool-name" style="font-weight:600;">Brush</span>
        <span class="opt-sep"></span>
        <label>Size</label><input type="range" id="opt-size" min="1" max="500" value="8"><input type="number" id="opt-size-n" value="8" style="width:32px">
        <span class="opt-sep"></span>
        <label>Hard</label><input type="range" id="opt-hard" min="0" max="100" value="75"><input type="number" id="opt-hard-n" value="75" style="width:32px">
        <span class="opt-sep"></span>
        <label>Fill</label>
        <select id="opt-fill">
          <option value="Outline">Outline</option><option value="Filled">Filled</option><option value="FilledOutline">Both</option>
        </select>
      </div>

      <!-- Document Tab Strip -->
      <div id="tab-strip"></div>
    </div>

    <!-- Workspace (canvas area + floating panels) -->
    <div id="workspace">
      <div id="workspace-inner">
        <div id="canvas-wrap">
          <canvas id="main-canvas"></canvas>
          <canvas id="overlay-canvas"></canvas>
        </div>
      </div>
    </div>

    <!-- Status Bar -->
    <div id="status-bar">
      <span id="sts-msg" style="flex:1;">Ready.</span>
      <span id="sts-pos">0, 0 px</span><span class="sts-sep">|</span>
      <span id="sts-sel">0 × 0 px</span><span class="sts-sep">|</span>
      <span id="sts-size">800 × 600 px</span><span class="sts-sep">|</span>
      <span id="sts-zoom">100%</span><span class="sts-sep">|</span>
      <span id="sts-layer">Background</span>
    </div>
  </div>
</body>
</html>
